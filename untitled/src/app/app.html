<div class="min-h-screen bg-slate-950 p-8 flex flex-col items-center font-sans">

  <h1 class="text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-red-400 to-blue-400 mb-10 drop-shadow-lg tracking-wider">
    MARIO SIMPLEX
  </h1>

  <div class="w-full max-w-6xl">

    @if (!simplexService.steps()) {

      <app-solver-input></app-solver-input>

    } @else {

      <app-soolver-result></app-soolver-result>

      <div class="mt-8 flex justify-center">
        <button (click)="simplexService.steps.set(null)"
                class="px-8 py-3 bg-slate-800 text-white font-bold rounded-xl border border-slate-700 hover:border-red-400 transition-colors shadow-lg">
          &larr; Start a New Problem
        </button>
      </div>

    }

  </div>
</div>
