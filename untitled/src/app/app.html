<div class="min-h-screen bg-slate-950 p-8 flex flex-col items-center font-sans">

  <h1 class="text-3xl md:text-5xl font-mario text-transparent bg-clip-text bg-gradient-to-r from-red-500 to-red-400 mb-10 tracking-widest drop-shadow-[0_4px_0_rgba(200,200,200,1)]">
    MARIO SIMPLEX
  </h1>

  <div class="w-full max-w-6xl">

    @if (!simplexService.steps()) {

      <app-solver-input></app-solver-input>

    } @else {

      <app-soolver-result></app-soolver-result>

      <div class="mt-8 flex justify-center">
        <button (click)="simplexService.steps.set(null)"
                class=" cursor-pointer px-8 py-5 bg-slate-800 text-white font-mario  border border-slate-700 hover:border-green-500 hover:shadow-[4px_4px_0_0_#22c55e] transition-colors ">
          <- Start New Problem
        </button>
      </div>

    }

  </div>
</div>
